# render.yaml — Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: zoomcarz-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Vercel URL e.g. https://zoomcarz.vercel.app
      - key: BACKEND_URL
        sync: false          # Set to your Render URL e.g. https://zoomcarz-backend.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false          # Set manually in Render dashboard
      - key: EMAIL_USER
        sync: false          # Set manually in Render dashboard
      - key: EMAIL_PASS
        sync: false          # Set manually in Render dashboard
